packages:
  "framer-motion": "For fluid card transitions, active state expansions, and general UI polish"
  "date-fns": "For date formatting and calculations"
  "react-hook-form": "For complex form state management (Add Subject)"
  "@hookform/resolvers": "For Zod schema validation with react-hook-form"
  "clsx": "For merging tailwind classes conditionally"
  "tailwind-merge": "For conflict resolution in tailwind classes"

images: []

notes:
  - "The API hooks are imported from @workspace/api-client-react. We wrap them in src/hooks to handle cache invalidation."
  - "Timer state is maintained in localStorage combined with React state to survive accidental refreshes."
  - "Application uses RTL layout and logical CSS properties for Arabic support."
